name: Antidotte

options:
  bundleIdPrefix: com.antidotte
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true  # mirrors your folder structure as Xcode groups
  groupSortPosition: top
  generateEmptyDirectories: false
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.10"
    TARGETED_DEVICE_FAMILY: "1"          # iPhone only
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    ENABLE_BITCODE: NO
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym

# ---------------------------------------------------------------------------
# Swift Package dependencies
# ---------------------------------------------------------------------------
packages:
  MapLibreNative:
    url: https://github.com/maplibre/maplibre-native
    from: "6.0.0"

# ---------------------------------------------------------------------------
# Main app target
# ---------------------------------------------------------------------------
targets:
  Antidotte:
    type: application
    platform: iOS
    deploymentTarget: "17.0"

    # All Swift source files — XcodeGen recurses through subdirectories
    # and mirrors the folder hierarchy as Xcode groups automatically.
    sources:
      - path: Antidotte

    # SPM dependencies
    dependencies:
      - package: MapLibreNative
        product: MapLibre

    # Info.plist — generated by XcodeGen, no separate file needed
    info:
      path: Antidotte/Info.plist
      properties:
        CFBundleDisplayName: Antidotte
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        # Location
        NSLocationWhenInUseUsageDescription: "Antidotte uses your location to show your position on the map for your friends."
        NSLocationAlwaysAndWhenInUseUsageDescription: "Antidotte uses your location in the background to keep your night-out position updated for your friends."
        NSLocationAlwaysUsageDescription: "Antidotte uses your location in the background to keep your night-out position updated for your friends."
        # Motion (MotionProcessor / CMMotionManager)
        NSMotionUsageDescription: "Antidotte uses motion data to passively estimate how you are doing during a night out."
        # Camera (photo drink logging)
        NSCameraUsageDescription: "Antidotte can log drinks by analysing photos you take."
        NSPhotoLibraryUsageDescription: "Antidotte can read photos from your library when logging drinks."
        # Microphone (TongueTwisterGame voice test)
        NSMicrophoneUsageDescription: "Antidotte uses the microphone for the Tongue Twister voice test."
        # Background modes
        UIBackgroundModes:
          - location
          - remote-notification
        # Push notifications
        BGTaskSchedulerPermittedIdentifiers:
          - com.antidotte.app.sync

    # Entitlements — generated by XcodeGen
    entitlements:
      path: Antidotte/Antidotte.entitlements
      properties:
        aps-environment: development           # change to "production" for App Store builds
        com.apple.developer.location.push: true

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.antidotte.app
        DEVELOPMENT_TEAM: ""                   # <-- paste your Apple Team ID here
        CODE_SIGN_STYLE: Automatic
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
        Release:
          SWIFT_OPTIMIZATION_LEVEL: "-O"
          VALIDATE_PRODUCT: YES
